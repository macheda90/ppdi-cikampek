# Nginx config untuk VPS (deploy ke /etc/nginx/sites-available/ppdi)
# Ganti ppdi-cikampek.id dengan domain Anda

server {
    listen 80;
    server_name ppdi-cikampek.id www.ppdi-cikampek.id;

    # Redirect HTTP to HTTPS (uncomment setelah SSL aktif)
    # return 301 https://$server_name$request_uri;

    # Upload size limit (untuk upload foto/file)
    client_max_body_size 20M;

    # Reverse proxy ke Next.js (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Serve static files langsung (lebih cepat)
    location /_next/static/ {
        alias /var/www/ppdi-cikampek/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /var/www/ppdi-cikampek/public/;
        expires 30d;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml
        application/json
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
